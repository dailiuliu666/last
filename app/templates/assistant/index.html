{% extends "base.html" %}

{% block title %}AI 助手{% endblock %}

{% block content %}
<section class="assistant-shell">
    <div class="assistant-top">
        <div>
            <div class="assistant-kicker">Main Platform Module</div>
            <h1>AI 财经助手</h1>
            <p>A 股数据查询、财务指标、新闻研报和个股对比已经迁入主平台。</p>
        </div>
        <div class="assistant-status">
            <span>Local Tools</span>
            <strong>8</strong>
        </div>
    </div>

    <div class="assistant-chat">
        <div class="assistant-market-bar">
            <div><span>Agent</span><strong>主平台内置</strong></div>
            <div><span>接口</span><strong>/api/assistant</strong></div>
            <div><span>数据源</span><strong>东方财富 / AkShare</strong></div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="msg msg-bot">
                <div class="msg-body">
                    <div class="msg-content">
                        <p>你好，我是 AI 财经助手。现在可以直接在主平台内完成 A 股查询和分析。</p>
                        <div class="quick-actions">
                            <button class="quick-btn" data-query="分析 600519 的估值、财务质量、近期走势和主要风险">分析贵州茅台</button>
                            <button class="quick-btn" data-query="对比 002594,300750,601012 的估值、市值、成交额和财务质量">对比个股</button>
                            <button class="quick-btn" data-query="查询 600519 的实时行情、市值、市盈率和成交额">查询行情</button>
                            <button class="quick-btn" data-query="最近 600519 有哪些重要新闻和研报观点">新闻研报</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-container">
                <textarea id="userInput" placeholder="输入你的 A 股问题，例如：分析 600519 的基本面和近期市场关注点" rows="1"></textarea>
                <button id="sendButton" class="send-btn" title="发送" type="button">发送</button>
            </div>
            <div class="disclaimer">内容仅用于教学和研究展示，不构成投资建议。</div>
        </div>
    </div>
</section>
<script src="/static/js/assistant.js"></script>
{% endblock %}
